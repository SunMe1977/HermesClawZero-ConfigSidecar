name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile memory.py
          python -m py_compile memory_sync.py
          python -m py_compile mcp_server.py
          python -m py_compile gardener.py
          python -m py_compile daily_reminder.py

      - name: Validate docker-compose.yml
        run: python -c "import yaml; f=open('docker-compose.yml'); yaml.safe_load(f); f.close(); print('OK')"

      - name: Check required files
        run: |
          for f in AGENTS.md llms.txt LICENSE Readme.md CHANGELOG.md .env.example; do
            test -f "$f" && printf "  %s: OK\n" "$f" || printf "  MISSING: %s\n" "$f"
          done
