# secrets.yaml
# Environment secrets required by hermesclawzero-auto-memory.

version: 1

secrets:
  - name: API_KEY
    description: "API key for HermesClawZero Sidecar authentication."
    required: true
    source: env
    env_var: API_KEY
    sensitive: true

  - name: MEM_PUBLIC_URL
    description: "Base URL of the HermesClawZero Sidecar API."
    required: false
    source: env
    env_var: MEM_PUBLIC_URL
    default: "http://localhost:8010"
    sensitive: false
