services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: gbrain-postgres
    ports:
      - "5666:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gbrain
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - db
      - ollama
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gbrain
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_HOST: http://ollama:11434

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: gbrain-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
