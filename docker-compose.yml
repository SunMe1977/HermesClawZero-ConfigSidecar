services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: gbrain-postgres
    restart: unless-stopped
    ports:
      - "5666:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: gbrain
      # Prevent re-init on container restart (must match existing cluster)
      PGUSER: postgres
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Backup script for safety before auto-update rebuilds
      - ./migrations/backup_db.sh:/docker-entrypoint-initdb.d/99-backup.sh:ro
      # PITR: WAL archive volume for point-in-time recovery
      - pgwal:/var/lib/postgresql/wal_archive
    command: >
      -c shared_buffers=1GB
      -c work_mem=64MB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=512MB
      -c random_page_cost=1.1
      -c max_parallel_workers_per_gather=4
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='cp %p /var/lib/postgresql/wal_archive/%f'
      -c archive_timeout=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gbrain"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: gbrain-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGBOUNCER_DATABASE: gbrain
      PGBOUNCER_PORT: 6432
      PGBOUNCER_MAX_CLIENT_CONN: 300
      PGBOUNCER_DEFAULT_POOL_SIZE: 50
      PGBOUNCER_MAX_DB_CONNECTIONS: 100
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_QUERY_TIMEOUT: 30
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRESQL_DATABASE: gbrain
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: 5432

  redis:
    image: redis:7-alpine
    container_name: gbrain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api1: &api-base
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /root/workspace/hc-sidecar:/app/repo
      - /root/workspace/hc-sidecar/sync:/app/sync
      - ${HERMES_DB_PATH_DIR:-/root/.hermes}:/hermes_state:ro
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: gbrain
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_POOL_MIN: ${DB_POOL_MIN:-10}
      DB_POOL_MAX: ${DB_POOL_MAX:-100}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: ${API_URL}
      API_KEY: ${API_KEY:?API_KEY is required}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-DagD2b1Jg+ZSzVoaaL5/MdzcNJvro4jnUpIXi9Fm2S4=}
      AI_PROVIDER: ${COMPOSE_AI_PROVIDER:-${AI_PROVIDER:-openrouter}}
      EMBEDDING_PROVIDER: auto
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      ALLOW_EMBEDDING_SCHEMA_RESET: "true"
      HERMES_DB_PATH: /hermes_state/state.db
      UPDATE_REPO_DIR: /app/repo
      UPDATE_REMOTE: ${AUTO_UPDATE_REMOTE:-origin}
      UPDATE_BRANCH: ${AUTO_UPDATE_BRANCH:-main}
      UPDATE_RESTART_COMMAND: ${UPDATE_RESTART_COMMAND:-}
      SYNC_DIR: ${SYNC_DIR}
      OLLAMA_HOST: ${OLLAMA_HOST}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/version', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 35s

  api2:
    <<: *api-base

  caddy:
    image: caddy:2-alpine
    container_name: gbrain-caddy
    restart: unless-stopped
    ports:
      - "8010:8010"
    depends_on:
      - api1
      - api2
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8010/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    profiles: ["ollama"]
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: gbrain-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  pgdata:
  ollama_data:
  caddy_data:
  pgwal:
