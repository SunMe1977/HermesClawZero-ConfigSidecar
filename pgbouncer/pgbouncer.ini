[databases]
gbrain = host=db port=5432 dbname=gbrain

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

# Pool tuning — 2M scale: 200 clients → 50 server connections
pool_mode = transaction
default_pool_size = 50
max_client_conn = 300
max_db_connections = 100
server_idle_timeout = 300
query_timeout = 30
stats_period = 60

# Safety
server_reset_query = DISCARD ALL
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
