<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
      .cursor { animation: blink 1s step-end infinite; }
      .l1 { opacity:0; animation: fadeIn 0.3s 0.2s forwards; }
      .l2 { opacity:0; animation: fadeIn 0.3s 0.8s forwards; }
      .l3 { opacity:0; animation: fadeIn 0.3s 1.4s forwards; }
      .l4 { opacity:0; animation: fadeIn 0.3s 2.0s forwards; }
      .l5 { opacity:0; animation: fadeIn 0.3s 2.6s forwards; }
      .l6 { opacity:0; animation: fadeIn 0.3s 3.2s forwards; }
      .l7 { opacity:0; animation: fadeIn 0.3s 3.8s forwards; }
      .l8 { opacity:0; animation: fadeIn 0.3s 4.4s forwards; }
      .l9 { opacity:0; animation: fadeIn 0.3s 5.0s forwards; }
      .l10 { opacity:0; animation: fadeIn 0.3s 5.6s forwards; }
      .l11 { opacity:0; animation: fadeIn 0.3s 6.2s forwards; }
      .l12 { opacity:0; animation: fadeIn 0.3s 6.8s forwards; }
      .l13 { opacity:0; animation: fadeIn 0.3s 7.4s forwards; }
      .l14 { opacity:0; animation: fadeIn 0.3s 8.0s forwards; }
      .l15 { opacity:0; animation: fadeIn 0.3s 8.6s forwards; }
      .foot { opacity:0; animation: fadeIn 0.5s 9.5s forwards; }
    </style>
  </defs>
  <!-- Terminal window -->
  <rect x="0" y="0" width="720" height="380" rx="8" fill="#1a1b26"/>
  <!-- Title bar dots -->
  <circle cx="30" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="24" r="5" fill="#febc2e"/>
  <circle cx="66" cy="24" r="5" fill="#28c840"/>
  <text x="90" y="29" fill="#565f89" font-family="monospace" font-size="12">HermesClawZero — Paste into your AI agent → done</text>
  <!-- Terminal content -->
  <g font-family="'Courier New',monospace" font-size="14">
    <text x="20" y="55" fill="#7dcfff" font-weight="bold" class="l1">
      1. Paste into Hermes / OpenClaw:
    </text>
    <text x="40" y="77" fill="#e0af68" class="l2">
      "Install this project from GitHub:"
    </text>
    <text x="40" y="99" fill="#e0af68" class="l3">
      "https://github.com/SunMe1977/HermesClawZero-ConfigSidecar"
    </text>
    <text x="20" y="130" fill="#73daca" class="l4">
      ✓ Cloned HermesClawZero-ConfigSidecar
    </text>
    <text x="20" y="152" fill="#73daca" class="l5">
      ✓ .env configured (Ollama, no API key needed)
    </text>
    <text x="20" y="174" fill="#73daca" class="l6">
      ✓ Docker containers building...
    </text>
    <text x="20" y="205" fill="#73daca" class="l7">
      ✓ gbrain-postgres  — healthy
    </text>
    <text x="20" y="227" fill="#73daca" class="l8">
      ✓ gbrain-ollama    — healthy (nomic-embed-text)
    </text>
    <text x="20" y="249" fill="#73daca" class="l9">
      ✓ api             — healthy (:8010)
    </text>
    <text x="20" y="280" fill="#9ece6a" class="l10">
      ✅ Stack ready — http://localhost:8010/healthz → OK
    </text>
    <text x="20" y="302" fill="#c0caf5" class="l11">
      $ python memory.py search "user profile" 3
    </text>
    <text x="40" y="324" fill="#c0caf5" class="l12">
      (no memories yet — start chatting!)
    </text>
    <text x="20" y="346" fill="#7dcfff" class="l13">
      🌐 Dashboard: http://localhost:8010/dashboard
    </text>
  </g>
  <!-- Cursor -->
  <rect x="690" y="14" width="8" height="16" rx="1" fill="#c0caf5" class="cursor"/>
  <!-- Footer -->
  <text x="480" y="375" fill="#565f89" font-family="monospace" font-size="10" class="foot">
    ⚡ Zero API keys · Zero config · 100% local
  </text>
</svg>
